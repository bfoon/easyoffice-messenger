name: easyoffice_messenger
description: EasyOffice Messenger — modern chat client for easyoffice.gm
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  url_launcher: ^6.3.0
dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/  

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0B5563"
  adaptive_icon_foreground: "assets/icon/icon.png"    